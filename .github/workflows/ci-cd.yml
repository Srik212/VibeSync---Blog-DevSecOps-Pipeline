# VibeSync - DevSecOps Pipeline

name: VibeSync CI/CD Pipeline

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

permissions:
    contents: read
    security-events: write
    actions: read

env:
    # Define the environment variables for the pipeline
    APP_NAME: VibeSync
    DOCKER_REGISTRY: ghcr.io
    BACKEND_IMAGE: ghcr.io/${{ github.repository }}/vibesync-backend
    FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/vibesync-frontend

jobs:
  secrets-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for accurate secret scanning

      - name: Run GitHub Secret Scanning
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          category: "secret-scanning"
  
  sast:
    name: Static Application Security Testing (SAST)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SonarCloud SAST Analysis
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarCloud Quality Gate Check
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Synk Code Scan
        uses: snyk/actions/node@master
        continue-on-error: true # Snyk exits non-zero when issues are found; let the SARIF upload still run
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test
          args: --sarif-file-output=synk-code_scan.sarif

      - name: Upload SAST Results to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: synk-code_scan.sarif
          category: "snyk-code-scan"

  sca:
    name: Software Composition Analysis (SCA)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Synk Dependency Scan
        uses: snyk/actions/node@master
        continue-on-error: true # Snyk exits non-zero when issues are found; let the SARIF upload still run
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=backend/package.json --severity-threshold=high --sarif-file-output=snyk-oss.sarif

      - name: Upload SCA Results to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk-oss.sarif
          category: "snyk-dependency-scan"

  iac:
    name: Infrastructure as Code (IaC) Checkov
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          frameworks: terraform,cloudformation,kubernetes,github_actions
          output_format: cli,sarif
          output_file_path: console,checkov.sarif
          soft_fail: true
          quiet: true

      - name: Upload IaC Results to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov.sarif
          category: "checkov-iac-scan"

  container-scan:
    name: Container Scanning (Trivy)
    needs: [secrets-scan, sast, sca, iac]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: prod
          tags: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          push: false
          load: true

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          target: prod
          tags: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          push: false
          load: true

      - name: Trivy scan - Backend image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 0

      - name: Trivy scan - Frontend image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 0

      - name: Upload Backend Trivy Results to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-backend.sarif
          category: "trivy-backend-container-scan"

      - name: Upload Frontend Trivy Results to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-frontend.sarif
          category: "trivy-frontend-container-scan"

  dast:
    name: Dynamic Application Security Testing (DAST - OWASP ZAP)
    needs: container-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create backend .env for test run
        run: |
          cat <<EOF > ./backend/.env
          PORT=5000
          JWT_SECRET=ci-dast-test-secret
          EOF

      - name: Start application stack
        run: docker compose up -d --build

      - name: Wait for stack to become healthy
        run: |
          # Backend has no published host port; it's only reachable via the
          # frontend's nginx /api/ proxy, so a 200 here confirms both are up.
          for i in $(seq 1 30); do
            curl -sf http://localhost:80/api/health && exit 0
            echo "Waiting for stack... ($i/30)"
            sleep 2
          done
          echo "Stack did not become healthy in time" >&2
          docker compose logs
          exit 1

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: "http://localhost:80"
          cmd_options: "-a"
          allow_issue_writing: false
          fail_action: false

      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-scan-reports
          path: |
            report_html.html
            report_md.md
            report_json.json
          if-no-files-found: ignore

      - name: Stop application stack
        if: always()
        run: docker compose down -v
